# history-empty-state.yaml
# Verifies the History List screen loads correctly and shows either
# the empty state or conversation history items.
#
# This flow is designed to pass regardless of backend state:
# - Fresh install: shows "No Conversations Yet" empty state
# - After conversations: shows conversation list
appId: com.coto.app
---
# Launch the application
- launchApp

# Wait for the Home screen to fully render.
# On Android emulators, the Expo dev client cold start can be slow.
- extendedWaitUntil:
    visible:
      text: "こんにちは"
    timeout: 30000

# Navigate to the History List screen via testID
- tapOn:
    id: "history-button"

# Wait for the screen to load (may include a network request)
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "No Conversations Yet|トーク履歴"
    timeout: 10000

# Verify the screen loaded (header is always present)
- assertVisible:
    text: "トーク履歴"

# On a fresh install, the empty state should be visible
- assertVisible:
    text: "No Conversations Yet"
    optional: true

# Capture evidence of the history screen state
- takeScreenshot: "history-screen-state"
